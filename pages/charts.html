<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charts & History · Smart Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <span class="brand-mark">🌱</span>
          <div class="brand-text">
            GardenTech<span>Monitoring & control</span>
          </div>
        </div>

        <ul class="sidebar-nav">
          <li class="nav-section-label">Menu utama</li>
          <li>
            <a href="../dashboard.html" class="nav-link"
              ><span class="nav-icon"
                ><i class="ti ti-layout-dashboard"></i
              ></span>
              Dashboard</a
            >
          </li>
          <li>
            <a href="devices.html" class="nav-link"
              ><span class="nav-icon"><i class="ti ti-cpu"></i></span>
              Devices</a
            >
          </li>
          <li>
            <a href="sensors.html" class="nav-link"
              ><span class="nav-icon"><i class="ti ti-gauge"></i></span>
              Sensors</a
            >
          </li>
          <li>
            <a href="charts.html" class="nav-link active"
              ><span class="nav-icon"><i class="ti ti-chart-line"></i></span>
              Charts & history</a
            >
          </li>
          <li>
            <a href="logs.html" class="nav-link"
              ><span class="nav-icon"><i class="ti ti-list-details"></i></span>
              Logs</a
            >
          </li>

          <li
            class="nav-section-label"
            id="sistemSectionLabel"
            style="display: none"
          >
            Sistem
          </li>
          <li id="settingsNavItem" style="display: none">
            <a href="settings.html" class="nav-link"
              ><span class="nav-icon"><i class="ti ti-settings"></i></span>
              Config (Backend & MQTT)</a
            >
          </li>
          <li id="usersNavItem" style="display: none">
            <a href="users.html" class="nav-link"
              ><span class="nav-icon"><i class="ti ti-users"></i></span>
              Manajemen User</a
            >
          </li>
        </ul>

        <div class="sidebar-footer">
          <button class="logout-btn" id="logoutBtn">
            <i class="ti ti-logout-2"></i> Keluar
          </button>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>

      <div class="main-area">
        <header class="topbar">
          <div style="display:flex; align-items:center; gap:12px;">
            <button class="hamburger-btn" id="hamburgerBtn"><i class="ti ti-menu-2"></i></button>
            <div class="topbar-title">
            <h1>Charts & history</h1>
            <p>Grafik historis tegangan dan arus pompa</p>
          </div>
          </div>
          <div class="topbar-right">
            <span class="connection-pill"
              ><span class="dot"></span> MQTT terhubung</span
            >
            <div class="topbar-user">
              <span class="avatar" id="userAvatar">A</span>
              <div>
                <span id="userName">admin</span
                ><span class="role" id="userRole">Admin</span>
              </div>
            </div>
          </div>
        </header>

        <main class="content">
          <section class="page-section">
            <div class="card card-pad">
              <div class="card-header">
                <h3>History data</h3>
              </div>

              <div
                style="
                  display: flex;
                  gap: 10px;
                  align-items: flex-end;
                  margin-bottom: 18px;
                  flex-wrap: wrap;
                "
              >
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label">Dari tanggal</label>
                  <input
                    type="date"
                    class="form-input"
                    id="dateFrom"
                    value="2026-06-01"
                    style="width: 160px"
                  />
                </div>
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label">Sampai tanggal</label>
                  <input
                    type="date"
                    class="form-input"
                    id="dateTo"
                    value="2026-06-07"
                    style="width: 160px"
                  />
                </div>
                <div class="form-group" style="margin-bottom: 0">
                  <label class="form-label">Device</label>
                  <select
                    class="form-select"
                    id="deviceFilter"
                    style="width: 160px"
                  >
                    <option value="dev002">Relay / pompa</option>
                    <option value="dev004">Soil moisture</option>
                    <option value="dev005">DHT22</option>
                  </select>
                </div>
                <button class="btn btn-primary" id="filterBtn">
                  <i class="ti ti-filter"></i> Filter
                </button>
              </div>

              <div style="height: 280px; position: relative">
                <canvas id="historyChart"></canvas>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dummy-data.js"></script>
    <script src="../js/ui.js"></script>
    <script>
      const session = requireAuth();
      document.getElementById("userName").textContent = session.username;
      document.getElementById("userRole").textContent = session.role;
      document.getElementById("userAvatar").textContent = session.username
        .substring(0, 2)
        .toUpperCase();

      // menu "Sistem" (Config & Manajemen User) hanya untuk Admin
      if (session.role === "Admin") {
        document.getElementById("sistemSectionLabel").style.display = "";
        document.getElementById("settingsNavItem").style.display = "";
        document.getElementById("usersNavItem").style.display = "";
      }
      document
        .getElementById("logoutBtn")
        .addEventListener("click", logoutUser);

      let chartInstance = null;

      async function fetchVoltageCurrentHistory() {
        if (APP_CONFIG.USE_DUMMY_DATA) {
          return getDummyVoltageCurrentHistory();
        }
        const res = await fetch(
          APP_CONFIG.API_BASE_URL + APP_CONFIG.SENSORS_VOLTAGE_HISTORY_ENDPOINT,
        );
        if (!res.ok) throw new Error("Gagal mengambil histori voltage/current.");
        return await res.json();
      }

      async function renderHistoryChart() {
        let history;
        try {
          history = await fetchVoltageCurrentHistory();
        } catch (err) {
          history = { labels: [], voltage: [], current: [] };
        }
        const ctx = document.getElementById("historyChart");

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
          type: "line",
          data: {
            labels: history.labels,
            datasets: [
              {
                label: "Voltage (V)",
                data: history.voltage,
                borderColor: "#2f6f8a",
                backgroundColor: "transparent",
                tension: 0.3,
                pointRadius: 2,
                borderWidth: 2,
                yAxisID: "y",
              },
              {
                label: "Current (A)",
                data: history.current,
                borderColor: "#2f8f4e",
                backgroundColor: "transparent",
                tension: 0.3,
                pointRadius: 2,
                borderWidth: 2,
                yAxisID: "y1",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: "top",
                labels: { boxWidth: 12, font: { size: 12 } },
              },
            },
            scales: {
              y: {
                type: "linear",
                position: "left",
                title: { display: true, text: "Voltage (V)" },
              },
              y1: {
                type: "linear",
                position: "right",
                title: { display: true, text: "Current (A)" },
                grid: { drawOnChartArea: false },
              },
            },
          },
        });
      }

      document
        .getElementById("filterBtn")
        .addEventListener("click", renderHistoryChart);
      renderHistoryChart();
    </script>
  </body>
</html>
